{% extends "base.html" %}

{% block content %}
  <div class="auth-wrapper">
    <div class="card auth-card">
      <div class="card-body">
        <h1 class="h3 fw-bold mb-2">Change password</h1>
        <p class="auth-hint">Choose a strong password you can remember.</p>
        <form method="post" action="{{ url_for('change_password') }}">
          <div class="mb-3">
            <label for="current_password" class="form-label">Current password</label>
            <input type="password" class="form-control" id="current_password" name="current_password" required autocomplete="current-password" />
          </div>
          <div class="mb-3">
            <label for="new_password" class="form-label">New password</label>
            <input type="password" class="form-control" id="new_password" name="new_password" required minlength="6" autocomplete="new-password" />
          </div>
          <div class="mb-3">
            <label for="confirm_password" class="form-label">Confirm new password</label>
            <input type="password" class="form-control" id="confirm_password" name="confirm_password" required minlength="6" autocomplete="new-password" />
          </div>
          <button type="submit" class="btn btn-primary w-100 rounded-pill py-2">Update password</button>
        </form>
      </div>
    </div>
  </div>
{% endblock %}
