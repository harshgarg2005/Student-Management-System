{% extends "base.html" %}

{% block content %}
  <div class="auth-wrapper fade-in-up">
    <div class="card auth-card border-0 shadow-lg" style="background: var(--surface); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05);">
      <div class="card-body p-5">
        <div class="text-center mb-4">
          <div class="d-inline-flex align-items-center justify-content-center bg-secondary bg-opacity-10 text-secondary rounded-circle mb-3" style="width: 64px; height: 64px;">
            <i class="bi bi-shield-lock fs-1"></i>
          </div>
          <h1 class="h3 fw-bold mb-1">Create Admin</h1>
          <p class="auth-hint text-muted">No users exist yet. Create the first admin to log in.</p>
        </div>
        
        <form method="post" action="{{ url_for('setup') }}">
          <div class="mb-3">
            <label for="username" class="form-label text-light fw-medium small">Username <span class="text-danger">*</span></label>
            <input type="text" class="form-control bg-transparent text-light border-secondary" id="username" name="username" required autofocus autocomplete="username" placeholder="admin" />
          </div>
          <div class="row g-3">
            <div class="col-md-6 mb-3">
              <label for="full_name" class="form-label text-light fw-medium small">Full Name</label>
              <input type="text" class="form-control bg-transparent text-light border-secondary" id="full_name" name="full_name" placeholder="John Doe" />
            </div>
            <div class="col-md-6 mb-3">
              <label for="phone" class="form-label text-light fw-medium small">Phone</label>
              <input type="text" class="form-control bg-transparent text-light border-secondary" id="phone" name="phone" placeholder="+1..." />
            </div>
          </div>
          <div class="mb-3">
            <label for="email" class="form-label text-light fw-medium small">Email (for OTP reset)</label>
            <input type="email" class="form-control bg-transparent text-light border-secondary" id="email" name="email" autocomplete="email" placeholder="admin@example.com" />
          </div>
          <div class="mb-4">
            <label for="password" class="form-label text-light fw-medium small">Password <span class="text-danger">*</span> <span class="text-muted fw-normal">(min 6 chars)</span></label>
            <input type="password" class="form-control bg-transparent text-light border-secondary" id="password" name="password" required minlength="6" autocomplete="new-password" placeholder="••••••" />
          </div>
          
          <button type="submit" class="btn btn-primary w-100 rounded-pill py-2 shadow-sm mb-4" style="background: linear-gradient(135deg, var(--secondary), var(--primary)); border: none; font-weight: 500;">
            Create Account & Login
          </button>
        </form>
        
        <div class="text-center mt-2 pt-3 border-top border-secondary border-opacity-25">
          <p class="auth-footer text-muted mb-0">Already have an account? <a href="{{ url_for('login') }}" class="text-primary fw-medium text-decoration-none">Log in</a></p>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
