{% extends "base.html" %}

{% block content %}
  <div class="auth-wrapper">
    <div class="card auth-card">
      <div class="card-body">
        <h1 class="h3 fw-bold mb-2">Reset password</h1>
        <p class="auth-hint">Enter the OTP you received via email or SMS and set a new password.</p>
        <form method="post" action="{{ url_for('reset_password') }}">
          <div class="mb-3">
            <label for="identifier" class="form-label">Username, Email, or Phone</label>
            <input type="text" class="form-control" id="identifier" name="identifier" required />
          </div>
          <div class="mb-3">
            <label for="otp" class="form-label">OTP</label>
            <input type="text" class="form-control" id="otp" name="otp" required inputmode="numeric" />
          </div>
          <div class="mb-3">
            <label for="new_password" class="form-label">New password</label>
            <input type="password" class="form-control" id="new_password" name="new_password" required minlength="6" autocomplete="new-password" />
          </div>
          <div class="mb-3">
            <label for="confirm_password" class="form-label">Confirm new password</label>
            <input type="password" class="form-control" id="confirm_password" name="confirm_password" required minlength="6" autocomplete="new-password" />
          </div>
          <button type="submit" class="btn btn-primary w-100 rounded-pill py-2">Reset password</button>
        </form>
        <p class="auth-footer">Need a new OTP? <a href="{{ url_for('forgot_password') }}">Send again</a></p>
      </div>
    </div>
  </div>
{% endblock %}
