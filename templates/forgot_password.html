{% extends "base.html" %}

{% block content %}
  <div class="auth-wrapper">
    <div class="card auth-card">
      <div class="card-body">
        <h1 class="h3 fw-bold mb-2">Forgot password</h1>
        <p class="auth-hint">Enter your username, registered email, or phone number. We’ll send an OTP.</p>
        <form method="post" action="{{ url_for('forgot_password') }}">
          <div class="mb-3">
            <label for="identifier" class="form-label">Username, Email, or Phone</label>
            <input type="text" class="form-control" id="identifier" name="identifier" required autofocus />
          </div>
          <button type="submit" class="btn btn-primary w-100 rounded-pill py-2">Send OTP</button>
        </form>
        <p class="auth-footer">Already have OTP? <a href="{{ url_for('reset_password') }}">Reset password</a></p>
      </div>
    </div>
  </div>
{% endblock %}
